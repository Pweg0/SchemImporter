modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

[[mods]]
    modId = "schematicimporter"
    version = "${mod_version}"
    displayName = "SchematicImporter"
    description = '''
        Import and paste schematic files (.schem, .nbt) in-game without crashing the server.
    '''
    displayTest = "IGNORE_SERVER_VERSION"

[[dependencies.schematicimporter]]
    modId = "neoforge"
    type = "required"
    versionRange = "${loader_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.schematicimporter]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
